<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tom Nevat | Illustration and Surface Pattern Design</title>
  <meta name="description" content="Tom Nevat is an illustrator and surface pattern designer creating hand-drawn artwork for licensing, fabric, wallpaper, home decor, stationery and print products." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero" aria-label="Tom Nevat introduction">
      <img class="logo" id="brand-logo" src="images/logo.png" alt="Tom Nevat logo" />
      <p class="tagline" id="brand-tagline"></p>
      <p class="brand-intro" id="brand-intro"></p>
    </header>

    <section class="gallery-section" aria-label="Portfolio image gallery">
      <div class="gallery" id="gallery"></div>
    </section>

    <section class="catalogue-cta" aria-label="Full catalogue access">
      <p id="catalogue-message"></p>
      <a class="catalog-button" id="catalog-button" href="catalog-access.html">Access the Full Catalog</a>
      <p class="password-note"><span id="password-note"></span> <a class="email-link" id="email-link" href="mailto:TomNevat@gmail.com">TomNevat@gmail.com</a></p>
    </section>

    <nav class="social-links" id="social-links" aria-label="Portfolio and shop links"></nav>

    <section class="about-section" aria-label="About Tom Nevat">
      <div class="about-layout">
        <img class="about-photo" src="images/about-photo.jpg" alt="Tom Nevat portrait">
        <div class="about-copy">
          <p id="about-text"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>© <span id="year"></span> Tom Nevat</span>
    <a href="mailto:TomNevat@gmail.com">TomNevat@gmail.com</a>
  </footer>

  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
